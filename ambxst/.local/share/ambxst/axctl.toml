[[layer_rules]]
namespace = "quickshell"
no_anim = true

[[layer_rules]]
namespace = "quickshell"
blur = true

[[layer_rules]]
namespace = "quickshell"
blur_popups = true

[[layer_rules]]
namespace = "quickshell"
ignore_alpha = true
ignore_alpha_value = 1.00

[[layer_rules]]
namespace = "selection"
no_anim = true

[[layer_rules]]
namespace = "fabric"
blur = true
ignore_alpha_value = 0.4

[[layer_rules]]
namespace = "ambxst"
blur = true
blur_popups = true
no_anim = true
ignore_alpha_value = 0.5

[[layer_rules]]
namespace = "overview"
blur = true
blur_popups = true
no_anim = true

[[layer_rules]]
namespace = "presets"
blur = true
blur_popups = true
no_anim = true

