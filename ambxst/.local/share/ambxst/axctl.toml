[startup]
exec-once = "ambxst"
[appearance]
[appearance.gaps]
inner = 5
outer = 20
[appearance.border]
width = 2
active_color = "rgb(ffb0cf)"
inactive_color = "rgb(272123)"
rounding = 16
[appearance.opacity]
active = 1.0
inactive = 1.0
[appearance.blur]
enabled = true
size = 4
passes = 2
[appearance.shadow]
enabled = true
size = 8
color = "rgba(00000080)"
[appearance.animations]
enabled = true

[general]
layout = "dwindle"

