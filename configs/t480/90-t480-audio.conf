# T480 ALC257 - Disable DSP/Dolby processing for clear audio
# This configuration bypasses the internal DSP that causes muffled/boxy sound
# on ThinkPad T480 with Realtek ALC257 codec

defaults.ctl.card 0
defaults.pcm.card 0

ctl.ALC257 {
    type hw
    card 0
}

pcm.ALC257 {
    type hw
    card 0
    device 0
    subdevice 0
    hint {
        description "ALC257 Direct (DSP Bypass)"
    }
}

# Additional ALC257-specific settings
pcm.!default {
    type plug
    slave {
        pcm "hw:0,0"
        format S16_LE
        rate 48000
        channels 2
    }
}
