###################
### KEYBINDINGS ###
###################

# See https://wiki.hyprland.org/Configuring/Keywords/
$mainMod = ALT # Sets main modifier

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = SHIFT $mainMod SUPER, T, exec, $terminal
bind = SHIFT $mainMod SUPER, B, exec, $browser
bind = SHIFT $mainMod SUPER, M, exec, $music
bind = SHIFT $mainMod SUPER, S, exec, $social
bind = $mainMod, M, exit,
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating,
bind = SUPER, Space, exec, $HOME/.config/rofi/launchers/launcher.sh || pkill rofi
bind = $mainMod, Space, exec, vicinae toggle
bind = $mainMod, P, pseudo,      # dwindle
bind = $mainMod, J, togglesplit, # dwindle
bind = $mainMod SHIFT, Q, exec, $hyprScripts/wlogout.sh
bind = $mainMod, R, exec, $HOME/.config/waybar/scripts/launch.sh

#--------------------exit hyprland-----------------------------------------------#
#--------------------------------------------------------------------------------#
bind = CTRL ALT, Delete, exec, hyprctl dispatch exit 0

#--------------------window management-------------------------------------------#
#--------------------------------------------------------------------------------#
bind = $mainMod, Q, killactive,
bind = $mainMod, F, fullscreen
bind = $mainMod SUPER, Q, exec, $hyprScripts/killActiveProcess.sh

#---------------wallpaper select & refresh & matugen color generation-----------------------#
#-------------------------------------------------------------------------------------------#
bind = $mainMod SUPER, W, exec, $hyprScripts/wallSelect.sh
bind = SUPER SHIFT, W, exec, vicinae deeplink vicinae://extensions/Matis_Olives/wallpaper/wallpaper-setter
bind = $mainMod SUPER, R, exec, $hyprScripts/refresh.sh

#---------------taking screenshot-------------------------------------------------#
#---------------------------------------------------------------------------------#
bind = $mainMod, Print, exec, hyprshot -m output -m active -o ~/Pictures/Screenshots
bind = $mainMod SHIFT, Print, exec, hyprshot -m region -o ~/Pictures/Screenshots
bind = $mainMod CTRL, Print, exec, hyprshot -m window -m active -o ~/Pictures/Screenshots
bind = $mainMod SUPER, S, exec, hyprshot -m region --freeze -o ~/Pictures/Screenshots

# Move focus with mainMod + arrow keys
bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness with Avizo OSD
bindel = ,XF86AudioRaiseVolume, exec, volumectl -u up
bindel = ,XF86AudioLowerVolume, exec, volumectl -u down
bindel = ,XF86AudioMute, exec, volumectl toggle-mute
bindel = ,XF86AudioMicMute, exec, volumectl -m toggle-mute
bindel = ,XF86MonBrightnessUp, exec, lightctl up
bindel = ,XF86MonBrightnessDown, exec, lightctl down

# Hyprpicker - Color picker (already installed)
bind = $mainMod, C, exec, hyprpicker -a | wl-copy

# AGS reload during development
bind = CTRL SHIFT, R, exec, ags -q; sleep 0.5; ags

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous
